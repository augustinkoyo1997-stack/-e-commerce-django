{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paiement réussi – DipitaShop</title>
    <style>
        body { font-family: 'Poppins', sans-serif; text-align: center; padding: 50px; background: #FEF9E6; }
        .success-box { background: white; border-radius: 20px; padding: 30px; max-width: 500px; margin: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: #00863E; }
        .btn { background: #00863E; color: white; padding: 10px 20px; border-radius: 40px; text-decoration: none; display: inline-block; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="success-box">
        <h1>✅ Merci pour votre commande !</h1>
        <p>Votre paiement a été accepté. Vous recevrez un email de confirmation sous peu.</p>
        <a href="/" class="btn">Retour à l'accueil</a>
    </div>
    <script>
        localStorage.removeItem('dipitaCartBenin');
        window.dispatchEvent(new Event('storage'));
    </script>
</body>
</html>
